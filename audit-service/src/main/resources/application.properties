# ----------------------------
# APP CONFIG
# ----------------------------
spring.application.name=audit-service
server.port=8085

# ----------------------------
# DATABASE CONFIG (MySQL)
# ----------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/nexa_ride
spring.datasource.username=root
spring.datasource.password=MySQL@1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ----------------------------
# KAFKA CONFIG
# ----------------------------
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=audit-group
spring.kafka.consumer.auto-offset-reset=latest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.nexaride.audit_service.event.BookingEvent

#Four thread/ instances of consumer(here notification service)
spring.kafka.listener.concurrency=4

# ----------------------------
# LOGGING
# ----------------------------
logging.level.root=INFO
logging.level.com.nexaride=DEBUG

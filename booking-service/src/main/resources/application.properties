# ===============================
# APPLICATION CONFIG
# ===============================
spring.application.name=booking-service
server.port=8083

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/nexa_ride
spring.datasource.username=root
spring.datasource.password=MySQL@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FEIGN CONFIG (OTP SERVICE CALL)
# ===============================
otp.service.url=http://localhost:8082
internal.api.key=${INTERNAL_API_KEY:OTP_INTERNAL_KEY_123}

# ===============================
# JWT CONFIG (FOR USER VALIDATION)
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# LOGGING CONFIG
# ===============================
logging.level.root=INFO
logging.level.com.nexaride=DEBUG

# console pattern with line number
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36}:%line - %msg%n

# file logging
logging.file.name=logs/booking-service.log

# file pattern
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36}:%line - %msg%n

# ===============================
# TIMEZONE (OPTIONAL)
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.tomcat.basedir=C:/Users/anirudhm/temp


# Kafka Broker
spring.kafka.bootstrap-servers=localhost:9092

# Producer Config
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
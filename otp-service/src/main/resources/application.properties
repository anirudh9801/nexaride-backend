# ===============================
# APPLICATION CONFIG
# ===============================
spring.application.name=otp-service
server.port=8082

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/nexa_ride
spring.datasource.username=root
spring.datasource.password=MySQL@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGGING CONFIG
# ===============================
logging.level.root=INFO
logging.level.com.nexaride=DEBUG

# console pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36}:%line - %msg%n

# file logging
logging.file.name=logs/otp-service.log

# file pattern
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36}:%line - %msg%n
# ===============================
# TIMEZONE (OPTIONAL)
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

internal.api.key=${INTERNAL_API_KEY}

#Redis Host and port number
spring.redis.host=localhost
spring.redis.port=6379


# Kafka Broker
spring.kafka.bootstrap-servers=localhost:9092

# Consumer Config
spring.kafka.consumer.group-id=otp-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.nexaride.otp_service.event.BookingEvent


#Four thread/ instances of consumer(here notification service)
spring.kafka.listener.concurrency=4

